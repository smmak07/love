<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Love</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    touch-action: manipulation;
}

/* Responsive heart size */
.heart{
    position:relative;
    width:min(80vw, 320px);
    height:min(80vw, 320px);
    transform:rotate(-45deg);
}

/* Lines building the heart */
.line{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:float 8s linear infinite;
}

.love_word{
    color:#ea80b0;
    font-size:clamp(12px, 3.5vw, 20px);
    letter-spacing:2px;
    white-space:nowrap;
    text-shadow:0 0 10px #fff, 0 0 20px #ea80b0, 0 0 40px #ea80b0;
    animation:slide 6s linear infinite;
}

/* Stack lines to form heart */
.line:nth-child(1){ transform:translateY(-32%); }
.line:nth-child(2){ transform:translateY(-24%); }
.line:nth-child(3){ transform:translateY(-16%); }
.line:nth-child(4){ transform:translateY(-8%); }
.line:nth-child(5){ transform:translateY(0%); }
.line:nth-child(6){ transform:translateY(8%); }
.line:nth-child(7){ transform:translateY(16%); }
.line:nth-child(8){ transform:translateY(24%); }
.line:nth-child(9){ transform:translateY(32%); }

/* Text movement */
@keyframes slide{
    0%{ transform:translateX(-100%); opacity:0; }
    50%{ opacity:1; }
    100%{ transform:translateX(100%); opacity:0; }
}

/* Slow floating rotation */
@keyframes float{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* Click hearts 💖 */
.click-heart{
    position:fixed;
    font-size:20px;
    color:#ff6fa5;
    pointer-events:none;
    animation:pop 900ms ease-out forwards;
}

@keyframes pop{
    0%{
        transform:translate(-50%, -50%) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translate(-50%, -150%) scale(1.8);
        opacity:0;
    }
}

/* Reduce animation for low-power devices */
@media (prefers-reduced-motion: reduce){
    .love_word, .line{
        animation:none;
    }
}
</style>
</head>

<body>

<div class="heart">
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
    <div class="line"><div class="love_word">I LOVE YOU I LOVE YOU</div></div>
</div>

<script>
/* Tap / Click effect 💖 */
function createHeart(x, y){
    const heart = document.createElement("div");
    heart.className = "click-heart";
    heart.innerHTML = "❤";
    heart.style.left = x + "px";
    heart.style.top = y + "px";

    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 900);
}

/* Works for both mobile touch and desktop click */
document.addEventListener("click", e=>{
    createHeart(e.clientX, e.clientY);
});

document.addEventListener("touchstart", e=>{
    const touch = e.touches[0];
    createHeart(touch.clientX, touch.clientY);
});
</script>

</body>
</html>
